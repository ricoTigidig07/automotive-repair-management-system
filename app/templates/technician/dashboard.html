{% extends "base/layout.html" %}

{% block title %}New Job - RepairOS{% endblock %}

{% block breadcrumb_items %}
    <li class="breadcrumb-item">
        <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
    </li>
    <li class="breadcrumb-item">
        <a href="{{ url_for('technician.current_jobs') }}">Current Jobs</a>
    </li>
    <li class="breadcrumb-item active">New Job</li>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="ti ti-plus me-2"></i>Create New Job</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Select Customer *</label>
                            <select class="form-select" name="customer_id" required>
                                <option value="">-- Select Customer --</option>
                                {% for customer in customers %}
                                <option value="{{ customer.customer_id }}">{{ customer.first_name }} {{ customer.family_name }} ({{ customer.email }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Job Date *</label>
                            <input type="date" class="form-control" name="job_date" value="{{ today }}" min="{{ today }}" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Create Job</button>
                            <a href="{{ url_for('technician.current_jobs') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
